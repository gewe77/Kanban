<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

/* ═══════════════════════════════════════
   DARK UI DESIGN — 9 PRINCIPLES
   1. Kein reines Schwarz: Elevation via Graustufen
   2. Kein reines Weiß: Opacity-basierter Text
   3. Entsättigte Akzentfarben
   4. Elevation durch Helligkeit statt Schatten
   5. Negative Space großzügig einsetzen
   6. Kontrast ohne Blendung
   7. Farbe sparsam, zielgerichtet einsetzen
   8. Konsistente visuelle Hierarchie
   9. Barrierefreiheit: WCAG AA Kontrastverhältnisse
═══════════════════════════════════════ */

:root {
  /* Elevation-Stufen — kein reines Schwarz */
  --el-0: #14161a;   /* Body-Hintergrund */
  --el-1: #1c1f26;   /* Datebar, Sidebar */
  --el-2: #20232b;   /* Spalten */
  --el-3: #282c35;   /* Karten */
  --el-4: #2f333d;   /* Hover-Karten, Inputs */
  --el-5: #363a45;   /* Aktive Elemente, Dropdowns */
  --el-modal: #1e2229; /* Modals — leicht heller als Board */

  /* Linien: subtil, nicht hart */
  --line:  rgba(255,255,255,0.055);
  --line2: rgba(255,255,255,0.10);
  --line3: rgba(255,255,255,0.16);

  /* Text — kein reines Weiß (Prinzip 2) */
  --text:  rgba(232,229,220,0.90);  /* Primär */
  --text2: rgba(195,192,183,0.60);  /* Sekundär */
  --text3: rgba(155,152,144,0.38);  /* Tertiär / Platzhalter */

  /* Akzente — entsättigt (Prinzip 3) */
  --amber:      #c07c10;
  --amber-light:#d4900f;
  --amber-bg:   rgba(192,124,16,0.10);
  --amber-rim:  rgba(192,124,16,0.28);

  --red:        #a83838;
  --red-light:  #c04444;
  --red-bg:     rgba(168,56,56,0.12);
  --red-rim:    rgba(168,56,56,0.30);

  --green:      #2e8a54;
  --green-light:#36a864;
  --green-bg:   rgba(46,138,84,0.10);
  --green-rim:  rgba(46,138,84,0.28);

  --blue:       #3868a0;
  --blue-light: #4a80bc;
  --blue-bg:    rgba(56,104,160,0.12);

  --violet:     #6848a0;
  --violet-light:#805ec0;
  --violet-bg:  rgba(104,72,160,0.12);
  --violet-rim: rgba(104,72,160,0.28);

  /* Spalten-Akzente — entsättigt, zurückhaltend */
  --c-eingang:  #3d6090;
  --c-jetzt:    #c07c10;
  --c-warten:   #6848a0;
  --c-erledigt: #2e8a54;
  --c-parken:   #387078;

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--el-0);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--el-5); border-radius: 2px; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--el-1);
  border-bottom: 1px solid var(--line2);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.logo span { color: var(--amber-light); }
.header-right { display: flex; align-items: center; gap: 8px; }

.wip-status {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  padding: 4px 10px;
  border: 1px solid var(--line2);
  border-radius: 3px;
  background: var(--el-2);
}
.wip-status.ok   { color: var(--green-light); border-color: var(--green-rim); }
.wip-status.warn { color: var(--red-light);   border-color: var(--red-rim); }

btn, button { font-family: var(--sans); cursor: pointer; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid var(--line2);
  background: var(--el-2);
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn:hover { background: var(--el-4); color: var(--text); border-color: var(--line3); }
.btn-primary {
  background: var(--amber);
  color: rgba(255,255,255,0.92);
  border-color: var(--amber);
}
.btn-primary:hover { background: var(--amber-light); border-color: var(--amber-light); }
.btn-danger  { color: var(--red-light);   border-color: var(--red-rim); background: transparent; }
.btn-danger:hover  { background: var(--red-bg); }
.btn-success { color: var(--green-light); border-color: var(--green-rim); background: transparent; }
.btn-success:hover { background: var(--green-bg); }
.btn-auth-on  { color: var(--green-light) !important; border-color: var(--green-rim) !important; }
.btn-auth-off { color: var(--text3); background: transparent; border-color: var(--line); }

/* ── Datebar ── */
.datebar {
  padding: 5px 24px;
  background: var(--el-1);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}
.datebar-item { display: flex; align-items: center; gap: 5px; }
.datebar-item.red   { color: var(--red-light); }
.datebar-item.amber { color: var(--amber-light); }

/* ── Board ── */
.board-wrap {
  padding: 20px 24px;
  min-height: calc(100vh - 100px);
}
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  align-items: flex-start;
}

/* ── Spalten — Elevation-Stufe 2 ── */
.col {
  background: var(--el-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  min-width: 0;
  overflow: hidden;
}

/* Spalten-Header mit Elevation + Akzent */
.col-head {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--el-2);
}
/* Farbiger Akzentbalken oben pro Spalte */
.col[data-col="eingang"] { border-top: 2px solid var(--c-eingang); }
.col[data-col="jetzt"]   { border-top: 2px solid var(--c-jetzt); }
.col[data-col="warten"]  { border-top: 2px solid var(--c-warten); }
.col[data-col="erledigt"]{ border-top: 2px solid var(--c-erledigt); }
.col[data-col="parken"]  { border-top: 2px solid var(--c-parken); }

.col-name {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.col[data-col="eingang"] .col-name { color: #6a92cc; }
.col[data-col="jetzt"]   .col-name { color: var(--amber-light); }
.col[data-col="warten"]  .col-name { color: #9878d0; }
.col[data-col="erledigt"].col-name { color: var(--green-light); }
.col[data-col="parken"]  .col-name { color: #5aa0a8; }

.col-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  background: var(--el-3);
  padding: 1px 7px;
  border-radius: 10px;
  border: 1px solid var(--line);
}
.col-count.warn { color: var(--red-light); background: var(--red-bg); border-color: var(--red-rim); }
.col-body { padding: 10px; min-height: 220px; }

/* ── Karten — Elevation-Stufe 3 ── */
.kcard {
  background: var(--el-3);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 11px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}
.kcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 5px 0 0 5px;
  background: var(--stripe-color, var(--text3));
}
.kcard:hover {
  background: var(--el-4);
  border-color: var(--line2);
  transform: translateY(-1px);
}
.kcard-title {
  font-size: 12px;
  font-weight: 500;
  color: rgba(220,230,245,0.92);
  line-height: 1.4;
  margin-bottom: 6px;
  padding-left: 8px;
  padding-bottom: 5px;
  display: block;
  border-bottom: 1px solid var(--stripe-color, rgba(100,150,220,0.30));
  letter-spacing: 0.01em;
}
.kcard-next {
  font-size: 11px; color: var(--text2);
  line-height: 1.45; padding-left: 8px; margin-bottom: 10px;
}
.kcard-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding-left: 8px;
}
.kcard-area {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: rgba(195,192,183,0.80);
  background: transparent;
  padding: 0;
  border: none;
  letter-spacing: 0.04em;
}
.kcard-due { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.kcard-due.red   { color: var(--red-light); }
.kcard-due.amber { color: var(--amber-light); }

.add-card-btn {
  width: 100%; border: 1px dashed var(--line3); background: transparent;
  color: var(--text2); font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.05em; padding: 7px 10px; text-align: center;
  cursor: pointer; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  margin-top: 4px;
}
.add-card-btn:hover { color: var(--amber-light); background: var(--amber-bg); border-color: var(--amber-rim); }

/* ── Modal — Elevation über Board ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(10,12,16,0.75);
  backdrop-filter: blur(2px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--el-modal);
  border: 1px solid var(--line3);
  border-radius: 8px;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}
.modal-head {
  padding: 16px 18px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase;
}
.modal-body { padding: 18px; }
.modal-foot {
  padding: 12px 18px; border-top: 1px solid var(--line);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ── Formular-Felder ── */
.field { margin-bottom: 14px; }
.field-label {
  display: block; font-family: var(--mono); font-size: 10px;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 5px;
}
.field-label .req { color: var(--amber-light); }
.field input, .field select, .field textarea {
  width: 100%; background: var(--el-3); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--text); font-family: var(--sans);
  font-size: 12px; padding: 8px 11px; outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--amber); background: var(--el-4);
}
.field textarea { min-height: 64px; resize: vertical; }
.field select { cursor: pointer; }
.field-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Drawer ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(10,12,16,0.65); backdrop-filter: blur(1px);
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(520px, 100vw);
  background: var(--el-modal);
  border-left: 1px solid var(--line3);
  box-shadow: -16px 0 48px rgba(0,0,0,0.4);
  z-index: 201; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.22s ease; overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  padding: 16px 18px; border-bottom: 1px solid var(--line);
  border-left: 4px solid var(--text3);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; flex-shrink: 0;
  transition: border-left-color 0.2s;
}
.drawer-head-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; flex: 1; }
.drawer-head-actions { display: flex; gap: 6px; flex-shrink: 0; }
.drawer-body { flex: 1; overflow-y: auto; padding: 18px; }

.drawer-section { margin-bottom: 22px; }
.drawer-section-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--line);
}
.drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.dfield-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px;
}
.dfield-val { font-size: 12px; color: var(--text); line-height: 1.5; }
.dfield-val.red   { color: var(--red-light); }
.dfield-val.amber { color: var(--amber-light); }

.next-step-box {
  background: var(--el-3); border: 1px solid var(--line);
  border-left: 3px solid var(--amber); border-radius: 4px;
  padding: 11px 14px; font-size: 12px; color: var(--text); line-height: 1.6;
}

/* ── Schritte / Checkliste ── */
.schritt-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--line);
  font-size: 12px; color: var(--text); line-height: 1.45;
}
.schritt-item:last-of-type { border-bottom: none; }
.schritt-check {
  width: 18px; height: 18px; flex-shrink: 0;
  border: 1.5px solid var(--line3); border-radius: 3px;
  background: var(--el-3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  margin-top: 1px;
  font-size: 11px; color: transparent;
}
.schritt-check:hover {
  border-color: var(--green-light); background: var(--green-bg);
  color: var(--green-light);
}
.schritt-text { flex: 1; }
.schritt-del {
  font-family: var(--mono); font-size: 9px; padding: 2px 5px;
  border-radius: 2px; border: 1px solid transparent;
  background: transparent; color: var(--text3); cursor: pointer;
  opacity: 0; transition: opacity 0.15s, color 0.12s;
  flex-shrink: 0;
}
.schritt-item:hover .schritt-del { opacity: 1; }
.schritt-del:hover { color: var(--red-light); border-color: var(--red-rim); background: var(--red-bg); }

.schritt-add {
  display: flex; gap: 6px; margin-top: 10px;
}
.schritt-add input {
  flex: 1; background: var(--el-3); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--text); font-family: var(--sans);
  font-size: 11px; padding: 6px 9px; outline: none;
}
.schritt-add input:focus { border-color: var(--amber); }

.schritt-progress {
  font-family: var(--mono); font-size: 10px;
  color: var(--text3); margin-top: 6px; display: flex;
  align-items: center; gap: 8px;
}
.schritt-progress-bar {
  flex: 1; height: 3px; background: var(--el-2);
  border-radius: 2px; overflow: hidden;
}
.schritt-progress-fill {
  height: 100%; background: var(--green); border-radius: 2px;
  transition: width 0.3s ease;
}

/* Karte: Fortschrittsanzeige */
.kcard-progress {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px; padding-left: 8px;
}
.kcard-progress-bar {
  flex: 1; height: 2px; background: var(--el-2);
  border-radius: 1px; overflow: hidden;
}
.kcard-progress-fill {
  height: 100%; background: var(--green); border-radius: 1px;
}
.kcard-progress-text {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  flex-shrink: 0;
}

.log-entry {
  padding: 9px 0; border-bottom: 1px solid var(--line);
  font-size: 11px; line-height: 1.55;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.log-entry:last-child { border-bottom: none; }
.log-entry-content { flex: 1; }
.log-entry-actions {
  display: flex; gap: 4px; flex-shrink: 0;
  opacity: 0; transition: opacity 0.15s;
}
.log-entry:hover .log-entry-actions { opacity: 1; }
.log-entry-btn {
  font-family: var(--mono); font-size: 9px; padding: 2px 6px;
  border-radius: 2px; border: 1px solid var(--line3);
  background: var(--el-3); color: var(--text2); cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.log-entry-btn:hover { background: var(--el-5); color: var(--text); }
.log-entry-btn.del:hover { background: var(--red-bg); color: var(--red-light); border-color: var(--red-rim); }
.log-date { font-family: var(--mono); color: var(--amber); font-size: 10px; display: block; margin-bottom: 2px; }
.log-text { color: var(--text2); }
.log-edit-input {
  width: 100%; background: var(--el-3); border: 1px solid var(--amber-rim);
  border-radius: 3px; color: var(--text); font-family: var(--sans);
  font-size: 11px; padding: 4px 8px; outline: none; margin-top: 4px;
}

.status-badge {
  display: inline-block; font-family: var(--mono); font-size: 10px;
  font-weight: 500; letter-spacing: 0.05em; padding: 2px 8px;
  border-radius: 3px; text-transform: uppercase;
}
.badge-eingang  { background: var(--blue-bg);   color: var(--blue-light);   border: 1px solid rgba(56,104,160,0.25); }
.badge-jetzt    { background: var(--amber-bg);  color: var(--amber-light);  border: 1px solid var(--amber-rim); }
.badge-warten   { background: var(--violet-bg); color: var(--violet-light); border: 1px solid var(--violet-rim); }
.badge-erledigt { background: var(--green-bg);  color: var(--green-light);  border: 1px solid var(--green-rim); }
.badge-parken   { background: rgba(56,112,120,0.12); color: #5aa0a8; border: 1px solid rgba(56,112,120,0.28); }

.log-add { display: flex; gap: 6px; margin-top: 12px; }
.log-add input {
  flex: 1; background: var(--el-3); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--text); font-family: var(--sans);
  font-size: 11px; padding: 6px 9px; outline: none;
}
.log-add input:focus { border-color: var(--amber); }

/* ── Confirm ── */
.confirm-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(10,12,16,0.82); backdrop-filter: blur(2px);
  align-items: center; justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--el-modal); border: 1px solid var(--red-rim);
  border-radius: 8px; padding: 22px 26px; max-width: 340px; width: 100%;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}
.confirm-title { font-family: var(--mono); font-size: 11px; color: var(--red-light); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.confirm-text  { font-size: 12px; color: var(--text2); margin-bottom: 18px; line-height: 1.55; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Empty ── */
.empty {
  padding: 24px 10px; text-align: center; color: var(--text2);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
}

/* ── Weekly Review ── */
.review-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(10,12,16,0.75); backdrop-filter: blur(2px);
  align-items: center; justify-content: center; padding: 20px;
}
.review-overlay.open { display: flex; }
.review-box {
  background: var(--el-modal); border: 1px solid var(--line3);
  border-radius: 8px; width: 100%; max-width: 560px; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}
.review-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.review-body { padding: 18px; }
.review-section { margin-bottom: 18px; }
.review-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 9px; }
.review-item {
  padding: 9px 12px; background: var(--el-3); border: 1px solid var(--line);
  border-radius: 4px; margin-bottom: 5px; font-size: 12px; color: var(--text);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.review-item-sub { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* Sync */
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block; margin-right: 5px; vertical-align: middle;
  background: var(--text3); transition: background 0.3s;
}
.sync-dot.synced  { background: var(--green-light); }
.sync-dot.syncing { background: var(--amber-light); animation: pulse 1s infinite; }
.sync-dot.error   { background: var(--red-light); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Drag & Drop ── */
.kcard { cursor: grab; }
.kcard.dragging {
  opacity: 0.45;
  cursor: grabbing;
  transform: rotate(1.5deg) scale(0.97);
}
.col-body.drag-over {
  background: rgba(192,124,16,0.06);
  outline: 1px dashed var(--amber-rim);
  outline-offset: -4px;
  border-radius: 4px;
}

</style>
</head>
<body>

<header>
  <div class="logo">BETRIEB <span>&amp;</span> PROJEKTE</div>
  <div class="header-right">
    <span class="wip-status" id="wipStatus">WIP: — / 3</span>
    <button class="btn btn-auth-off" id="authBtn" onclick="handleAuth()">○ Anmelden</button>
    <button class="btn" onclick="openReview()">⬡ Weekly Review</button>
    <button class="btn btn-primary" onclick="openNewModal()">+ Neuer Vorgang</button>
  </div>
</header>

<div class="datebar">
  <span class="datebar-item" id="datebarToday"></span>
  <span style="color:var(--line2)">|</span>
  <span class="datebar-item" id="datebarSync"><span class="sync-dot" id="syncDot"></span><span id="syncText">Lokal</span></span>
  <span style="color:var(--line2)">|</span>
  <span class="datebar-item red"   id="datebarOverdue"></span>
  <span class="datebar-item amber" id="datebarDueSoon"></span>
  <span class="datebar-item"       id="datebarWaiting"></span>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- ═══ NEW / EDIT MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Neuer Vorgang</span>
      <button class="btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">Thema / Titel <span class="req">*</span></label>
        <input type="text" id="fThema" placeholder="z.B. Druckprüfung Druckluft Süd">
      </div>
      <div class="field-row2">
        <div class="field">
          <label class="field-label">Bereich / Ort</label>
          <input type="text" id="fBereich" placeholder="z.B. Energie, Lüftung">
        </div>
        <div class="field">
          <label class="field-label">Status</label>
          <select id="fStatus">
            <option value="eingang">Eingang</option>
            <option value="jetzt">Jetzt</option>
            <option value="warten">Warten</option>
            <option value="erledigt">Erledigt</option>
            <option value="parken">Parken</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Zeitfokus</label>
        <select id="fZeitfokus">
          <option value="Sofort">Sofort</option>
          <option value="Heute">Heute</option>
          <option value="Diese Woche" selected>Diese Woche</option>
          <option value="Terminieren">Terminieren</option>
          <option value="Kann warten">Kann warten</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Nächster Schritt <span class="req">*</span></label>
        <textarea id="fNaechsterSchritt" placeholder="Beginnt mit Verb — z.B. Angebot anfordern bei Firma XY"></textarea>
      </div>
      <div class="field-row2">
        <div class="field">
          <label class="field-label">Fällig / Wiedervorlage</label>
          <input type="date" id="fFaellig">
        </div>
        <div class="field">
          <label class="field-label">Warten auf</label>
          <input type="text" id="fWartenAuf" placeholder="Person / Stelle">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Nachweis / Referenz</label>
        <input type="text" id="fNachweis" placeholder="Mailbetreff, Ticket, Dateiname — optional">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveCard()">Speichern →</button>
    </div>
  </div>
</div>

<!-- ═══ DETAIL DRAWER ═══ -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head" id="drawerHead">
    <div class="drawer-head-title" id="drawerTitle"></div>
    <div class="drawer-head-actions">
      <button class="btn btn-success" onclick="markErledigt()">✓ Erledigt</button>
      <button class="btn" onclick="editFromDrawer()">Bearbeiten</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Löschen</button>
      <button class="btn" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- ═══ CONFIRM DELETE ═══ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Vorgang löschen?</div>
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm()">Abbrechen</button>
      <button class="btn btn-danger" onclick="doDelete()">Löschen</button>
    </div>
  </div>
</div>

<!-- ═══ WEEKLY REVIEW ═══ -->
<div class="review-overlay" id="reviewOverlay" onclick="closeReviewIfBg(event)">
  <div class="review-box">
    <div class="review-head">
      <span class="modal-title">⬡ Weekly Review</span>
      <button class="btn" onclick="closeReview()">✕</button>
    </div>
    <div class="review-body" id="reviewBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATEN
// ═══════════════════════════════════════════════
const STORE_KEY = 'kanban_betrieb_v1';
const COLS = [
  { id: 'eingang',  name: 'Eingang'  },
  { id: 'warten',  name: 'Warten'   },
  { id: 'jetzt',   name: 'Jetzt'    },
  { id: 'parken',  name: 'Parken'   },
  { id: 'erledigt',name: 'Erledigt' },
];

let cards = [];
let editingId = null;
let drawerCardId = null;
let deleteTargetId = null;

window._currentUser = null;

function uid()   { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function fmt(d)  { if (!d) return ''; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dueClass(f) {
  if (!f) return 'normal';
  const diff = (new Date(f) - new Date(today())) / 86400000;
  return diff < 0 ? 'due-red' : diff <= 5 ? 'due-amber' : 'normal';
}

function loadLocalData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; }
}
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }

// ═══════════════════════════════════════════════
// SYNC-STATUS
// ═══════════════════════════════════════════════
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot) return;
  dot.className = 'sync-dot ' + state;
  txt.textContent = { synced:'Firestore sync', syncing:'Speichern…', error:'Sync-Fehler' }[state] || 'Lokal';
}

// ═══════════════════════════════════════════════
// FIRESTORE
// ═══════════════════════════════════════════════
async function loadFromFirestore() {
  setSyncStatus('syncing');
  try {
    const { getDocs } = window._fbFns;
    const snap = await getDocs(window._fbCol());
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    saveLocal();
    setSyncStatus('synced');
    render();
  } catch(e) {
    console.error('Firestore laden:', e);
    setSyncStatus('error');
    cards = loadLocalData();
    render();
  }
}

async function saveToFirestore() {
  if (!window._currentUser) return;
  setSyncStatus('syncing');
  try {
    const { setDoc, doc } = window._fbFns;
    for (const card of cards) {
      await setDoc(doc(window._db, 'vorgaenge', card.id), card);
    }
    setSyncStatus('synced');
  } catch(e) { console.error('Firestore speichern:', e); setSyncStatus('error'); }
}

async function deleteFromFirestore(id) {
  if (!window._currentUser) return;
  try {
    const { deleteDoc, doc } = window._fbFns;
    await deleteDoc(doc(window._db, 'vorgaenge', id));
  } catch(e) { console.error('Firestore löschen:', e); }
}

function saveData() { saveLocal(); saveToFirestore(); }

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  if (!btn) return;
  if (window._currentUser) {
    const e = window._currentUser.email || 'Angemeldet';
    btn.textContent = '● ' + (e.length > 22 ? e.slice(0,20)+'…' : e);
    btn.className = 'btn btn-auth-on';
  } else {
    btn.textContent = '○ Anmelden';
    btn.className = 'btn btn-auth-off';
    setSyncStatus('');
  }
}

async function handleAuth() {
  if (!window._fbFns) return;
  const { signInWithPopup, GoogleAuthProvider, signOut } = window._fbFns;
  if (window._currentUser) {
    if (confirm('Abmelden?')) await signOut(window._auth);
  } else {
    try { await signInWithPopup(window._auth, new GoogleAuthProvider()); }
    catch(e) { if (e.code !== 'auth/popup-closed-by-user') alert('Anmeldung fehlgeschlagen: ' + e.message); }
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const jetzt   = cards.filter(c => c.status === 'jetzt');
  const overdue = cards.filter(c => c.faellig && dueClass(c.faellig)==='due-red'   && c.status!=='erledigt');
  const dueSoon = cards.filter(c => c.faellig && dueClass(c.faellig)==='due-amber' && c.status!=='erledigt');
  const warten  = cards.filter(c => c.status === 'warten');

  const wip = document.getElementById('wipStatus');
  wip.textContent = `WIP: ${jetzt.length} / 3`;
  wip.className   = 'wip-status ' + (jetzt.length > 3 ? 'warn' : 'ok');

  document.getElementById('datebarToday').textContent   = today();
  document.getElementById('datebarOverdue').textContent = overdue.length ? `⚠ ${overdue.length} überfällig` : '';
  document.getElementById('datebarDueSoon').textContent = dueSoon.length ? `◷ ${dueSoon.length} fällt diese Woche` : '';
  const waitEl = document.getElementById('datebarWaiting');
  waitEl.textContent = warten.length  ? `⧖ ${warten.length} in Warten` : '';
  waitEl.style.color = warten.length ? '#9878d0' : '';

  const COL_COLORS = {
    eingang:  '#6a92cc',
    warten:   '#9878d0',
    jetzt:    '#d4900f',
    parken:   '#5aa0a8',
    erledigt: '#36a864',
  };

  COLS.forEach(col => {
    const colCards = cards.filter(c => c.status === col.id);
    const isWarn   = (col.id==='jetzt' && colCards.length>3) || (col.id==='warten' && colCards.length>5);
    const countColor = isWarn ? '' : `color:${COL_COLORS[col.id]||'var(--text3)'}`;
    const div = document.createElement('div');
    div.className = 'col';
    div.dataset.col = col.id;
    div.innerHTML = `
      <div class="col-head">
        <span class="col-name">${col.name}</span>
        <span class="col-count ${isWarn?'warn':''}" style="${countColor}">${colCards.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}"></div>`;
    board.appendChild(div);

    const body = div.querySelector(`#col-${col.id}`);
    if (!colCards.length) body.innerHTML = '<div class="empty">— leer —</div>';

    colCards.forEach(card => {
      const dc  = dueClass(card.faellig);
      const due = card.faellig
        ? `<span class="kcard-due ${dc==='due-red'?'red':dc==='due-amber'?'amber':''}">${dc==='due-red'?'⚠ ':''}${fmt(card.faellig)}</span>`
        : '<span class="kcard-due">—</span>';
      const statusCol = STATUS_COLOR[card.status] || '#3a4050';
      const schritte  = card.schritte || [];
      const done      = card.schritteDone || 0;
      const total     = schritte.length + done;
      const nextStep  = schritte.length ? schritte[0] : (card.naechsterSchritt || '—');
      const progressHtml = total > 0
        ? `<div class="kcard-progress">
            <div class="kcard-progress-bar"><div class="kcard-progress-fill" style="width:${Math.round(done/total*100)}%"></div></div>
            <span class="kcard-progress-text">${done}/${total}</span>
           </div>`
        : '';

      const el = document.createElement('div');
      el.className = `kcard ${dc}`;
      el.draggable = true;
      el.dataset.id = card.id;
      el.style.setProperty('--stripe-color', dc === 'due-red' ? 'var(--red-light)' : dc === 'due-amber' ? 'var(--amber-light)' : statusCol);
      el.innerHTML = `
        <div class="kcard-title">${esc(card.thema)}</div>
        <div class="kcard-next">${esc(nextStep)}</div>
        <div class="kcard-meta">
          <span class="kcard-area">${esc(card.bereich||'—')}</span>
          ${due}
        </div>
        ${progressHtml}`;
      el.addEventListener('click', () => openDrawer(card.id));

      // Drag events
      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('cardId', card.id);
        setTimeout(() => el.classList.add('dragging'), 0);
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      body.appendChild(el);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.textContent = '+ Vorgang';
    addBtn.addEventListener('click', () => openNewModal(col.id));
    body.appendChild(addBtn);

    // Drop-Zone Events
    body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = e.dataTransfer.getData('cardId');
      const card = cards.find(x => x.id === id);
      if (!card || card.status === col.id) return;
      const t = today();
      const oldStatus = card.status;
      card.status = col.id;
      card.letzteUpdate = t;
      card.log = `${t}: Status → ${col.id} (Drag & Drop)\n` + (card.log||'');
      saveData();
      render();
    });
  });
}

// Status → Farbe (CSS-Wert)
const STATUS_COLOR = {
  eingang:  '#3d6090',
  jetzt:    '#c07c10',
  warten:   '#6848a0',
  erledigt: '#2e8a54',
  parken:   '#387078',
};

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openNewModal(colId) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Neuer Vorgang';
  ['fThema','fBereich','fNaechsterSchritt','fFaellig','fWartenAuf','fNachweis']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('fStatus').value    = colId || 'eingang';
  document.getElementById('fZeitfokus').value = 'Diese Woche';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fThema').focus(), 50);
}

function openEditModal(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent      = 'Vorgang bearbeiten';
  document.getElementById('fThema').value                = c.thema || '';
  document.getElementById('fBereich').value              = c.bereich || '';
  document.getElementById('fStatus').value               = c.status || 'eingang';
  document.getElementById('fZeitfokus').value            = c.zeitfokus || 'Diese Woche';
  document.getElementById('fNaechsterSchritt').value     = c.naechsterSchritt || '';
  document.getElementById('fFaellig').value              = c.faellig || '';
  document.getElementById('fWartenAuf').value            = c.wartenAuf || '';
  document.getElementById('fNachweis').value             = c.nachweis || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal()      { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalIfBg(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

function saveCard() {
  const thema = document.getElementById('fThema').value.trim();
  const next  = document.getElementById('fNaechsterSchritt').value.trim();
  if (!thema) { document.getElementById('fThema').focus(); return; }
  const t = today();

  if (editingId) {
    const c = cards.find(x => x.id === editingId);
    const oldStatus = c.status;
    c.thema = thema;
    c.bereich          = document.getElementById('fBereich').value.trim();
    c.status           = document.getElementById('fStatus').value;
    c.zeitfokus        = document.getElementById('fZeitfokus').value;
    c.naechsterSchritt = next;
    c.faellig          = document.getElementById('fFaellig').value;
    c.wartenAuf        = document.getElementById('fWartenAuf').value.trim();
    c.nachweis         = document.getElementById('fNachweis').value.trim();
    c.letzteUpdate     = t;
    const logLine = `${t}: Bearbeitet${c.status!==oldStatus?' → Status: '+c.status:''}`;
    c.log = c.log ? logLine+'\n'+c.log : logLine;
  } else {
    cards.push({
      id: uid(), thema,
      bereich:          document.getElementById('fBereich').value.trim(),
      status:           document.getElementById('fStatus').value,
      zeitfokus:        document.getElementById('fZeitfokus').value,
      naechsterSchritt: next,
      faellig:          document.getElementById('fFaellig').value,
      wartenAuf:        document.getElementById('fWartenAuf').value.trim(),
      nachweis:         document.getElementById('fNachweis').value.trim(),
      letzteUpdate:     t,
      log:              `${t}: Vorgang angelegt`,
    });
  }
  saveData(); closeModal(); render();
  if (editingId && drawerCardId === editingId) openDrawer(editingId);
}

// ═══════════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════════
function openDrawer(id) {
  drawerCardId = id;
  const c = cards.find(x => x.id === id);
  if (!c) return;
  document.getElementById('drawerTitle').textContent = c.thema;
  document.getElementById('drawerHead').style.borderLeftColor = STATUS_COLOR[c.status] || '#3a4050';

  const dc = dueClass(c.faellig);
  const dueVal = c.faellig
    ? `<span class="${dc==='due-red'?'red':dc==='due-amber'?'amber':''}">${dc==='due-red'?'⚠ ':''}${fmt(c.faellig)}${dc==='due-red'?' — überfällig':''}</span>`
    : '—';
  const badgeClass = {eingang:'badge-eingang',jetzt:'badge-jetzt',warten:'badge-warten',erledigt:'badge-erledigt',parken:'badge-parken'}[c.status]||'badge-eingang';
  const statusLabel = {eingang:'Eingang',jetzt:'Jetzt',warten:'Warten',erledigt:'Erledigt',parken:'Parken'}[c.status];
  const logLines = (c.log||'').split('\n').filter(Boolean).map((l, idx) => {
    const m = l.match(/^(\d{4}-\d{2}-\d{2}):\s*(.+)$/);
    const dateSpan = m ? `<span class="log-date">${m[1]}</span>` : '';
    const textSpan = `<span class="log-text">${esc(m ? m[2] : l)}</span>`;
    return `<div class="log-entry">
      <div class="log-entry-content">${dateSpan}${textSpan}</div>
      <div class="log-entry-actions">
        <button class="log-entry-btn" onclick="editLogEntry(event,${idx})">✎</button>
        <button class="log-entry-btn del" onclick="deleteLogEntry(${idx})">✕</button>
      </div>
    </div>`;
  }).join('');

  const schritte  = c.schritte || [];
  const done      = c.schritteDone || 0;
  const total     = schritte.length + done;
  const nextStep  = schritte.length ? schritte[0] : (c.naechsterSchritt || '—');

  const schritteHtml = schritte.map((s, idx) => `
    <div class="schritt-item">
      <div class="schritt-check" onclick="checkSchritt(${idx})" title="Abhaken">✓</div>
      <div class="schritt-text">${esc(s)}</div>
      <button class="schritt-del" onclick="deleteSchritt(${idx})" title="Entfernen">✕</button>
    </div>`).join('');

  const progressHtml = total > 0
    ? `<div class="schritt-progress">
        <span>${done}/${total} erledigt</span>
        <div class="schritt-progress-bar"><div class="schritt-progress-fill" style="width:${Math.round(done/total*100)}%"></div></div>
       </div>`
    : '';

  document.getElementById('drawerBody').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Metadaten</div>
      <div class="drawer-grid">
        <div><div class="dfield-label">Status</div><div class="dfield-val"><span class="status-badge ${badgeClass}">${statusLabel}</span></div></div>
        <div><div class="dfield-label">Zeitfokus</div><div class="dfield-val">${esc(c.zeitfokus||'—')}</div></div>
        <div><div class="dfield-label">Bereich / Ort</div><div class="dfield-val">${esc(c.bereich||'—')}</div></div>
        <div><div class="dfield-label">Fällig / WV</div><div class="dfield-val">${dueVal}</div></div>
        <div><div class="dfield-label">Warten auf</div><div class="dfield-val">${esc(c.wartenAuf||'—')}</div></div>
        <div><div class="dfield-label">Nachweis</div><div class="dfield-val">${esc(c.nachweis||'—')}</div></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Nächster Schritt</div>
      <div class="next-step-box">${esc(nextStep)}</div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Schritte${total > 0 ? ' ('+done+'/'+total+')' : ''}</div>
      ${schritteHtml || '<div style="color:var(--text3);font-size:11px">Noch keine Schritte geplant.</div>'}
      ${progressHtml}
      <div class="schritt-add">
        <input type="text" id="schrittInput" placeholder="Neuen Schritt hinzufügen…" onkeydown="if(event.key==='Enter')addSchritt()">
        <button class="btn" onclick="addSchritt()">+ Schritt</button>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Log / Chronik</div>
      <div id="drawerLog">${logLines||'<div style="color:var(--text3);font-size:11px">Noch kein Eintrag.</div>'}</div>
      <div class="log-add">
        <input type="text" id="logInput" placeholder="Neuer Log-Eintrag…" onkeydown="if(event.key==='Enter')addLogEntry()">
        <button class="btn" onclick="addLogEntry()">+ Log</button>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px">
      Letztes Update: ${c.letzteUpdate||'—'}
    </div>`;

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  drawerCardId = null;
}
function editFromDrawer() { const id=drawerCardId; closeDrawer(); openEditModal(id); }

function markErledigt() {
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  const t = today();
  c.status='erledigt'; c.letzteUpdate=t;
  c.log=`${t}: Erledigt markiert\n`+(c.log||'');
  saveData(); closeDrawer(); render();
}

// ═══════════════════════════════════════════════
// SCHRITTE
// ═══════════════════════════════════════════════
function addSchritt() {
  const input = document.getElementById('schrittInput');
  const text  = (input.value||'').trim();
  if (!text) return;
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  if (!c.schritte) c.schritte = [];
  c.schritte.push(text);
  c.letzteUpdate = today();
  saveData(); render(); openDrawer(drawerCardId);
}

function checkSchritt(idx) {
  const c = cards.find(x => x.id === drawerCardId);
  if (!c || !c.schritte || idx >= c.schritte.length) return;
  const t    = today();
  const text = c.schritte[idx];
  c.schritte.splice(idx, 1);
  c.schritteDone = (c.schritteDone || 0) + 1;
  c.log = `${t}: ✓ ${text}\n` + (c.log||'');
  c.letzteUpdate = t;
  saveData(); render(); openDrawer(drawerCardId);
}

function deleteSchritt(idx) {
  const c = cards.find(x => x.id === drawerCardId);
  if (!c || !c.schritte || idx >= c.schritte.length) return;
  c.schritte.splice(idx, 1);
  c.letzteUpdate = today();
  saveData(); render(); openDrawer(drawerCardId);
}

function editLogEntry(e, idx) {
  e.stopPropagation();
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  const lines = (c.log||'').split('\n').filter(Boolean);
  if (idx >= lines.length) return;

  const entryDiv = e.currentTarget.closest('.log-entry');
  const content  = entryDiv.querySelector('.log-entry-content');
  const actions  = entryDiv.querySelector('.log-entry-actions');

  // Aktuellen Text extrahieren (ohne Datum-Prefix)
  const m = lines[idx].match(/^(\d{4}-\d{2}-\d{2}):\s*(.+)$/);
  const currentText = m ? m[2] : lines[idx];
  const prefix      = m ? m[1] + ': ' : '';

  // Input-Feld einblenden
  const input = document.createElement('input');
  input.type  = 'text';
  input.className = 'log-edit-input';
  input.value = currentText;
  content.appendChild(input);
  input.focus();
  actions.style.opacity = '1';

  // Speichern-Button tauschen
  const editBtn = e.currentTarget;
  editBtn.textContent = '✓';
  editBtn.onclick = null;
  editBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    const newText = input.value.trim();
    if (newText) lines[idx] = prefix + newText;
    c.log = lines.join('\n');
    c.letzteUpdate = today();
    saveData();
    openDrawer(drawerCardId);
  });
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  editBtn.click();
    if (ev.key === 'Escape') openDrawer(drawerCardId);
  });
}

function deleteLogEntry(idx) {
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  const lines = (c.log||'').split('\n').filter(Boolean);
  lines.splice(idx, 1);
  c.log = lines.join('\n');
  c.letzteUpdate = today();
  saveData();
  openDrawer(drawerCardId);
}

function addLogEntry() {
  const input = document.getElementById('logInput');
  const text  = (input.value||'').trim();
  if (!text) return;
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  const t = today();
  c.log=`${t}: ${text}`+(c.log?'\n'+c.log:'');
  c.letzteUpdate=t;
  saveData(); openDrawer(drawerCardId);
}

// ═══════════════════════════════════════════════
// LÖSCHEN
// ═══════════════════════════════════════════════
function confirmDelete() {
  const c = cards.find(x => x.id === drawerCardId);
  if (!c) return;
  deleteTargetId = drawerCardId;
  document.getElementById('confirmText').textContent = `„${c.thema}" wird unwiderruflich gelöscht.`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deleteTargetId = null;
}
function doDelete() {
  deleteFromFirestore(deleteTargetId);
  cards = cards.filter(x => x.id !== deleteTargetId);
  saveLocal();
  closeConfirm(); closeDrawer(); render();
}

// ═══════════════════════════════════════════════
// WEEKLY REVIEW
// ═══════════════════════════════════════════════
function openReview() {
  const jetzt   = cards.filter(c=>c.status==='jetzt');
  const warten  = cards.filter(c=>c.status==='warten');
  const eingang = cards.filter(c=>c.status==='eingang');
  const overdue = cards.filter(c=>c.faellig&&dueClass(c.faellig)==='due-red'&&c.status!=='erledigt');
  const wartenAlt = warten.filter(c=>c.faellig&&(new Date()-new Date(c.faellig))/86400000>7);
  const t = today();

  document.getElementById('reviewBody').innerHTML = `
    <div class="review-section">
      <div class="review-label">WIP-Check — Jetzt (${jetzt.length}/3)</div>
      ${!jetzt.length?'<div style="color:var(--text3);font-size:12px;padding:6px 0">Keine aktiven Vorgänge.</div>':''}
      ${jetzt.map(c=>`<div class="review-item">${esc(c.thema)}<span class="review-item-sub">${esc(c.zeitfokus||'')}</span></div>`).join('')}
      ${jetzt.length>3?'<div style="color:var(--red);font-size:11px;padding:4px 0;font-family:var(--mono)">⚠ WIP-Limit überschritten</div>':''}
    </div>
    <div class="review-section">
      <div class="review-label">Überfällig (${overdue.length})</div>
      ${!overdue.length?'<div style="color:var(--text3);font-size:12px;padding:6px 0">Keine überfälligen Vorgänge.</div>':''}
      ${overdue.map(c=>`<div class="review-item">${esc(c.thema)}<span class="review-item-sub" style="color:var(--red)">seit ${fmt(c.faellig)}</span></div>`).join('')}
    </div>
    <div class="review-section">
      <div class="review-label">Warten > 7 Tage (${wartenAlt.length})</div>
      ${!wartenAlt.length?'<div style="color:var(--text3);font-size:12px;padding:6px 0">Kein Vorgang hängt zu lang.</div>':''}
      ${wartenAlt.map(c=>`<div class="review-item">${esc(c.thema)}<span class="review-item-sub">${esc(c.wartenAuf||'?')}</span></div>`).join('')}
    </div>
    <div class="review-section">
      <div class="review-label">Eingang — zu triagieren (${eingang.length})</div>
      ${!eingang.length?'<div style="color:var(--text3);font-size:12px;padding:6px 0">Eingang leer.</div>':''}
      ${eingang.map(c=>`<div class="review-item">${esc(c.thema)}<span class="review-item-sub">${esc(c.naechsterSchritt||'')}</span></div>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px">Review-Stand: ${t}</div>`;

  document.getElementById('reviewOverlay').classList.add('open');
}
function closeReview()      { document.getElementById('reviewOverlay').classList.remove('open'); }
function closeReviewIfBg(e) { if(e.target===document.getElementById('reviewOverlay')) closeReview(); }

// ═══════════════════════════════════════════════
// KEYBOARD + INIT
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeDrawer(); closeConfirm(); closeReview(); }
  if (e.key==='n' && !e.ctrlKey && !e.metaKey &&
      !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) openNewModal();
});

// Fallback: lokale Daten anzeigen bis Firebase antwortet
cards = loadLocalData();
render();
</script>
</body>
</html>
